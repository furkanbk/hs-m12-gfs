<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Naranja DFS — Client</title>
  <style>
    :root { --orange: #ff7a18; --bg: #1e1e22; --card: #2a2a30; --ok: #34c759; --err: #ff453a; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: #eee; margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .card {
      background: var(--card); border-radius: 14px; padding: 32px;
      width: 100%; max-width: 520px; box-shadow: 0 10px 30px rgba(0,0,0,.4);
    }
    h1 { margin: 0 0 4px; font-size: 1.6rem; }
    h1 span { color: var(--orange); }
    p.sub { margin: 0 0 24px; color: #aaa; font-size: .9rem; }
    input[type=file] {
      width: 100%; padding: 14px; border: 2px dashed #555; border-radius: 10px;
      background: #222; color: #ccc; cursor: pointer; margin-bottom: 16px;
    }
    button {
      width: 100%; padding: 14px; border: 0; border-radius: 10px;
      background: var(--orange); color: #1a1a1a; font-weight: 700; font-size: 1rem;
      cursor: pointer;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .row { display: flex; gap: 8px; }
    .row button { width: auto; flex: 1; }
    input[type=text] {
      width: 100%; padding: 12px; border: 2px solid #555; border-radius: 10px;
      background: #222; color: #eee; margin-bottom: 12px;
    }
    .secondary { background: #444; color: #eee; }
    .danger { background: var(--err); color: #1a1a1a; }
    hr { border: 0; border-top: 1px solid #3a3a40; margin: 28px 0; }
    h2 { font-size: 1.1rem; margin: 0 0 12px; }
    #result, #manageResult { margin-top: 20px; font-size: .9rem; white-space: pre-wrap; }
    #result.ok, #manageResult.ok { color: var(--ok); }
    #result.err, #manageResult.err { color: var(--err); }
    .meta { color: #ccc; background: #222; border-radius: 8px; padding: 12px; margin-top: 12px; }
    .meta b { color: var(--orange); }
    pre.content {
      background: #222; border-radius: 8px; padding: 12px; margin-top: 12px;
      max-height: 240px; overflow: auto; color: #ddd; font-size: .85rem;
    }
    code { color: #ffcf99; }
  </style>
</head>
<body>
  <div class="card">
    <h1><span>Naranja</span> DFS</h1>
    <p class="sub">Upload a <code>.txt</code> file. It is split into 1024-byte chunks,
      pushed to all replicas, committed via the leader, then registered.</p>

    <input type="file" id="file" accept=".txt,text/plain" />
    <button id="send">Send</button>

    <div id="result"></div>

    <hr />

    <h2>Manage a stored file</h2>
    <p class="sub">Look up a file by name to read it back, check its size, or delete it.</p>
    <input type="text" id="filename" placeholder="notes.txt" />
    <div class="row">
      <button id="read" class="secondary">Read</button>
      <button id="size" class="secondary">Get size</button>
      <button id="delete" class="danger">Delete</button>
    </div>

    <div id="manageResult"></div>
  </div>

  <script>
    const fileInput = document.getElementById("file");
    const sendBtn = document.getElementById("send");
    const result = document.getElementById("result");

    sendBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      result.className = "";
      if (!file) {
        result.className = "err";
        result.textContent = "Please choose a .txt file first.";
        return;
      }
      if (!file.name.toLowerCase().endsWith(".txt")) {
        result.className = "err";
        result.textContent = "Only .txt files are accepted.";
        return;
      }

      sendBtn.disabled = true;
      result.className = "";
      result.textContent = "Uploading and writing chunks…";

      const form = new FormData();
      form.append("file", file);

      try {
        const resp = await fetch("/api/files", { method: "POST", body: form });
        const data = await resp.json();
        if (!resp.ok) {
          throw new Error(data.detail || ("HTTP " + resp.status));
        }
        result.className = "ok";
        result.innerHTML = "✅ <b>File written successfully</b>" +
          '<div class="meta">' +
          "<div><b>file_id:</b> " + data.file_id + "</div>" +
          "<div><b>filename:</b> " + data.filename + "</div>" +
          "<div><b>size:</b> " + data.size_bytes + " bytes</div>" +
          "<div><b>chunks:</b> " + data.num_chunks + "</div>" +
          "<div><b>replicas hit:</b> " + data.replicas_hit.join(", ") + "</div>" +
          "</div>";
      } catch (err) {
        result.className = "err";
        result.textContent = "❌ Failed: " + err.message;
      } finally {
        sendBtn.disabled = false;
      }
    });

    // --- Read / Get-size / Delete -----------------------------------------
    const filenameInput = document.getElementById("filename");
    const readBtn = document.getElementById("read");
    const sizeBtn = document.getElementById("size");
    const deleteBtn = document.getElementById("delete");
    const manageResult = document.getElementById("manageResult");
    const manageButtons = [readBtn, sizeBtn, deleteBtn];

    function currentFilename() {
      const name = filenameInput.value.trim();
      if (!name) {
        manageResult.className = "err";
        manageResult.textContent = "Enter a filename first.";
        return null;
      }
      return name;
    }

    async function withManage(label, fn) {
      const name = currentFilename();
      if (!name) return;
      manageButtons.forEach((b) => (b.disabled = true));
      manageResult.className = "";
      manageResult.textContent = label + " " + name + "…";
      try {
        await fn(name);
      } catch (err) {
        manageResult.className = "err";
        manageResult.textContent = "❌ Failed: " + err.message;
      } finally {
        manageButtons.forEach((b) => (b.disabled = false));
      }
    }

    readBtn.addEventListener("click", () => withManage("Reading", async (name) => {
      const resp = await fetch("/api/files/" + encodeURIComponent(name));
      if (!resp.ok) {
        const data = await resp.json().catch(() => ({}));
        throw new Error(data.detail || ("HTTP " + resp.status));
      }
      const text = await resp.text();
      manageResult.className = "ok";
      manageResult.innerHTML = "✅ <b>Read " + name + "</b> (" + text.length +
        " chars)<pre class=\"content\"></pre>";
      manageResult.querySelector("pre.content").textContent = text;
    }));

    sizeBtn.addEventListener("click", () => withManage("Sizing", async (name) => {
      const resp = await fetch("/api/files/" + encodeURIComponent(name) + "/size");
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || ("HTTP " + resp.status));
      manageResult.className = "ok";
      manageResult.innerHTML = "✅ <b>" + name + "</b>" +
        '<div class="meta"><div><b>size:</b> ' + data.size_bytes + " bytes</div></div>";
    }));

    deleteBtn.addEventListener("click", () => withManage("Deleting", async (name) => {
      const resp = await fetch("/api/files/" + encodeURIComponent(name), { method: "DELETE" });
      const data = await resp.json();
      if (!resp.ok) throw new Error(data.detail || ("HTTP " + resp.status));
      const failed = data.replicas_failed || [];
      manageResult.className = failed.length ? "err" : "ok";
      let html = (failed.length ? "⚠️ " : "✅ ") + "<b>Deleted " + name + "</b>" +
        '<div class="meta">' +
        "<div><b>chunks:</b> " + data.num_chunks + "</div>" +
        "<div><b>replicas purged:</b> " + data.replicas_purged + "</div>";
      if (failed.length) {
        html += "<div><b>could not purge:</b> " +
          failed.map((f) => f.replica + " (" + f.chunk_id.slice(0, 8) + "…)").join(", ") +
          "</div>";
      }
      manageResult.innerHTML = html + "</div>";
    }));
  </script>
</body>
</html>
